name: New Card Request
description: Request support for a new credit card
title: "[Card]: "
labels: ["new-card", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Request support for a new credit card!

  - type: input
    id: card-name
    attributes:
      label: Card Name
      placeholder: e.g., Chase Sapphire Reserve
    validations:
      required: true

  - type: input
    id: issuer
    attributes:
      label: Card Issuer
      placeholder: e.g., Chase, Amex, Citi
    validations:
      required: true

  - type: textarea
    id: rewards
    attributes:
      label: Reward Structure
      description: List the card's reward categories and rates
      placeholder: |
        - 3x on dining
        - 2x on travel
        - 1x on everything else
    validations:
      required: true

  - type: dropdown
    id: card-type
    attributes:
      label: Card Type
      options:
        - Fixed Categories
        - Rotating Categories
        - Selectable Categories
        - Flat Rate
    validations:
      required: true

  - type: input
    id: annual-fee
    attributes:
      label: Annual Fee
      placeholder: e.g., $95 or $0

  - type: input
    id: source
    attributes:
      label: Source URL
      description: Link to official card page
      placeholder: https://...
